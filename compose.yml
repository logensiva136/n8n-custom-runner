services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_EDITOR_BASE_URL=http://0.0.0.0:5678
      - WEBHOOK_URL=http://0.0.0.0:5678/
      - GENERIC_TIMEZONE=Asia/Kuala_Lumpur
      - TZ=Asia/Kuala_Lumpur 
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_AUTH_TOKEN=topsecretkey
      - N8N_PAYLOAD_SIZE_MAX=50MB # added to increase the payload size limit
    volumes:
      - n8n_data:/home/node/.n8n
  task-runner-js:
    build:
      context: .
      dockerfile: Dockerfile.js
    container_name: n8n-runner-js
    command: ["javascript"]
    restart: unless-stopped
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_AUTH_TOKEN=topsecretkey
    depends_on:
      - n8n

  task-runner-python:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: n8n-runner-python
    command: ["python"]
    restart: unless-stopped
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_AUTH_TOKEN=topsecretkey
    depends_on:
      - n8n
volumes:
  n8n_data:
